spring.application.name=NewNow-project

# MySQL konekcija
spring.datasource.url=jdbc:mysql://localhost:3306/newnow?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=lozinka123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate pode?avanja
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Email je MOCK - samo se loguje u konzoli, ne salje se stvarno
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=newnow.noreply@gmail.com
spring.mail.password=mockpassword
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Elasticsearch
spring.elasticsearch.uris=http://localhost:9200

# MinIO
minio.url=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket-name=newnow-files

# Max upload size
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB